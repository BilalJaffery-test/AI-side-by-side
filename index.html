<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Side by Side</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e11;
      color: #e8e8e8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Header */
    #header {
      padding: 24px 32px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e24;
    }
    #header h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #f0f0f0;
    }
    #header p {
      margin-top: 4px;
      color: #555;
      font-size: 13px;
    }

    #settings-btn {
      background: transparent;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 8px 14px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #settings-btn:hover { background: #1e1e24; }
    #settings-btn.active { background: #2a2a30; }

    /* Settings panel */
    #settings-panel {
      display: none;
      background: #13131a;
      border-bottom: 1px solid #1e1e24;
      padding: 20px 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    #settings-panel.open { display: flex; }

    .key-field { flex: 1 1 200px; min-width: 180px; }
    .key-field label {
      display: block;
      font-size: 11px;
      margin-bottom: 6px;
      font-family: monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .key-field input {
      width: 100%;
      background: #1c1c24;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
      transition: border-color 0.2s;
    }
    .key-field input:focus { outline: none; }
    .key-note {
      flex: 1 1 200px;
      min-width: 180px;
      display: flex;
      align-items: flex-end;
    }
    .key-note p { font-size: 12px; color: #444; line-height: 1.5; }

    /* Prompt area */
    #prompt-area {
      padding: 24px 32px;
      border-bottom: 1px solid #1e1e24;
    }
    #prompt-box {
      background: #13131a;
      border: 1px solid #2a2a30;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    #prompt-box:focus-within { border-color: #3a3a44; }
    #prompt-input {
      background: transparent;
      border: none;
      padding: 16px 18px 8px;
      color: #e8e8e8;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      resize: vertical;
      line-height: 1.6;
      min-height: 80px;
      width: 100%;
    }
    #prompt-input:focus { outline: none; }
    #prompt-footer {
      padding: 8px 14px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #prompt-hint { font-size: 11px; color: #333; }
    #run-btn {
      background: #1e1e24;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      color: #444;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    #run-btn.ready {
      background: linear-gradient(135deg, #D97B4F, #c4623a);
      color: #fff;
    }
    #run-btn.ready:hover { opacity: 0.9; }

    /* Results grid */
    #results {
      flex: 1;
      padding: 24px 32px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .model-card {
      flex: 1 1 0;
      min-width: 220px;
      background: #18181b;
      border-radius: 16px;
      border: 1.5px solid transparent;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.2s;
      animation: fadeIn 0.3s ease both;
    }
    .model-card-header {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff33;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .status-dot.loading { background: #fff; box-shadow: 0 0 8px #fff; animation: pulse 1s infinite; }
    .status-dot.done { background: #d4f5a0; }
    .status-dot.error { background: #ff8a8a; }

    .model-name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 17px;
      color: #fff;
      font-weight: 600;
    }
    .model-company {
      font-size: 11px;
      color: #ffffff99;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    .model-body {
      flex: 1;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.65;
      color: #555;
      font-family: 'DM Sans', sans-serif;
      white-space: pre-wrap;
      overflow-y: auto;
      min-height: 120px;
      max-height: 60vh;
    }
    .model-body.has-result { color: #e8e8e8; }
    .model-body.has-error { color: #ff8a8a; }
    .model-body .thinking { font-style: italic; }

    /* Empty state */
    #empty-state {
      position: fixed;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #2a2a30;
      pointer-events: none;
    }
    #empty-state .icons { font-size: 40px; margin-bottom: 12px; opacity: 0.3; letter-spacing: 4px; }
    #empty-state p {
      font-family: 'Instrument Serif', serif;
      font-size: 18px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div>
      <h1>AI <em>Side by Side</em></h1>
      <p>Compare Claude, ChatGPT, Gemini &amp; Copilot in one prompt</p>
    </div>
    <button id="settings-btn" onclick="toggleSettings()">⚙ API Keys</button>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div class="key-field">
      <label style="color:#D97B4F">Claude (Anthropic)</label>
      <input type="password" id="key-claude" placeholder="sk-ant-..." oninput="updateKeyBorder(this,'#D97B4F')"/>
    </div>
    <div class="key-field">
      <label style="color:#10A37F">ChatGPT (OpenAI)</label>
      <input type="password" id="key-openai" placeholder="sk-..." oninput="updateKeyBorder(this,'#10A37F')"/>
    </div>
    <div class="key-field">
      <label style="color:#4285F4">Gemini (Google)</label>
      <input type="password" id="key-gemini" placeholder="AIza..." oninput="updateKeyBorder(this,'#4285F4')"/>
    </div>
    <div class="key-field">
      <label style="color:#00A4EF">o3 (OpenAI key)</label>
      <input type="password" id="key-copilot" placeholder="sk-..." oninput="updateKeyBorder(this,'#00A4EF')"/>
    </div>
    <div class="key-note">
      <p>Keys stay in your browser only.<br/>Never stored — session memory only.</p>
    </div>
  </div>

  <!-- Prompt Input -->
  <div id="prompt-area">
    <div id="prompt-box">
      <textarea id="prompt-input" rows="3" placeholder='Ask anything… e.g. "Explain quantum entanglement in simple terms"' oninput="onPromptInput()" onkeydown="onPromptKey(event)"></textarea>
      <div id="prompt-footer">
        <span id="prompt-hint">Ctrl + Enter to run</span>
        <button id="run-btn" onclick="runAll()">Compare →</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Cards injected here -->
  </div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="icons">🤖🤖🤖🤖</div>
    <p>Enter a prompt above to compare responses</p>
  </div>

  <script>
    const MODELS = [
      { id: "claude",   name: "Claude",   company: "Anthropic", color: "#D97B4F" },
      { id: "chatgpt",  name: "ChatGPT",  company: "OpenAI",    color: "#10A37F" },
      { id: "gemini",   name: "Gemini",   company: "Google",    color: "#4285F4" },
      { id: "copilot",  name: "o3",       company: "OpenAI",    color: "#00A4EF" },
    ];

    // Render cards once on load
    function initCards() {
      const container = document.getElementById('results');
      MODELS.forEach(m => {
        const card = document.createElement('div');
        card.className = 'model-card';
        card.id = `card-${m.id}`;
        card.style.borderColor = m.color + '33';
        card.innerHTML = `
          <div class="model-card-header" style="background:${m.color}">
            <div class="status-dot" id="dot-${m.id}"></div>
            <div>
              <div class="model-name">${m.name}</div>
              <div class="model-company">${m.company}</div>
            </div>
          </div>
          <div class="model-body" id="body-${m.id}"><span style="color:#444">Response will appear here</span></div>
        `;
        container.appendChild(card);
      });
    }

    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      const btn = document.getElementById('settings-btn');
      panel.classList.toggle('open');
      btn.classList.toggle('active');
    }

    function updateKeyBorder(input, color) {
      input.style.borderColor = input.value ? color + '88' : '#2a2a30';
    }

    function onPromptInput() {
      const val = document.getElementById('prompt-input').value.trim();
      const btn = document.getElementById('run-btn');
      btn.classList.toggle('ready', val.length > 0);
    }

    function onPromptKey(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runAll();
    }

    function setCardLoading(id, color) {
      const dot = document.getElementById(`dot-${id}`);
      const body = document.getElementById(`body-${id}`);
      const card = document.getElementById(`card-${id}`);
      dot.className = 'status-dot loading';
      body.className = 'model-body';
      body.innerHTML = `<span class="thinking" style="color:${color}">Thinking…</span>`;
      card.style.boxShadow = `0 0 0 2px ${color}66`;
    }

    function setCardResult(id, text) {
      const dot = document.getElementById(`dot-${id}`);
      const body = document.getElementById(`body-${id}`);
      const card = document.getElementById(`card-${id}`);
      dot.className = 'status-dot done';
      body.className = 'model-body has-result';
      body.textContent = text;
      card.style.boxShadow = 'none';
    }

    function setCardError(id, msg) {
      const dot = document.getElementById(`dot-${id}`);
      const body = document.getElementById(`body-${id}`);
      const card = document.getElementById(`card-${id}`);
      dot.className = 'status-dot error';
      body.className = 'model-body has-error';
      body.textContent = '⚠ ' + msg;
      card.style.boxShadow = 'none';
    }

    async function callClaude(prompt) {
      const apiKey = document.getElementById('key-claude').value.trim();
      if (!apiKey) throw new Error('No Claude API key provided. Add it in ⚙ API Keys.');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Claude API error');
      return data.content?.[0]?.text || '';
    }

    async function callOpenAI(prompt, apiKey, model = 'gpt-4o') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'OpenAI API error');
      return data.choices?.[0]?.message?.content || '';
    }

    async function callGemini(prompt, apiKey) {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Gemini API error');
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    async function runAll() {
      const prompt = document.getElementById('prompt-input').value.trim();
      if (!prompt) return;

      document.getElementById('empty-state').style.display = 'none';

      const claudeKey = document.getElementById('key-claude').value.trim();
      const openaiKey = document.getElementById('key-openai').value.trim();
      const geminiKey = document.getElementById('key-gemini').value.trim();
      const copilotKey = document.getElementById('key-copilot').value.trim();

      const runners = [
        {
          id: 'claude',
          color: '#D97B4F',
          key: document.getElementById('key-claude').value.trim(),
          fn: () => callClaude(prompt)
        },
        {
          id: 'chatgpt',
          color: '#10A37F',
          key: openaiKey,
          fn: () => callOpenAI(prompt, openaiKey)
        },
        {
          id: 'gemini',
          color: '#4285F4',
          key: geminiKey,
          fn: () => callGemini(prompt, geminiKey)
        },
        {
          id: 'copilot',
          color: '#00A4EF',
          key: copilotKey,
          fn: () => callOpenAI(prompt, copilotKey, 'o3')
        },
      ];

      runners.forEach(async ({ id, color, key, fn }) => {
        if (key === '') {
          setCardError(id, 'No API key provided. Click ⚙ API Keys above to add one.');
          return;
        }
        setCardLoading(id, color);
        try {
          const text = await fn();
          setCardResult(id, text);
        } catch (err) {
          setCardError(id, err.message);
        }
      });
    }

    initCards();
  </script>
</body>
</html>
