<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Side by Side</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f7;
      color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    #header {
      padding: 24px 32px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid #e0e0e5;
      background: #fff;
    }
    #header h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #1a1a1a;
    }
    #header p { margin-top: 4px; color: #999; font-size: 13px; }

    #settings-btn {
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 14px;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #settings-btn:hover { background: #f5f5f7; }
    #settings-btn.active { background: #efefef; }

    #settings-panel {
      display: none;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e5;
      padding: 20px 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    #settings-panel.open { display: flex; }

    .key-field { flex: 1 1 200px; min-width: 180px; }
    .key-field label {
      display: block; font-size: 11px; margin-bottom: 6px;
      font-family: monospace; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .key-field input {
      width: 100%; background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: 8px 12px; color: #333; font-size: 13px; font-family: monospace;
      transition: border-color 0.2s;
    }
    .key-field input:focus { outline: none; border-color: #aaa; }
    .key-note { flex: 1 1 200px; min-width: 180px; display: flex; align-items: flex-end; }
    .key-note p { font-size: 12px; color: #aaa; line-height: 1.5; }

    #prompt-area {
      padding: 24px 32px;
      border-bottom: 1px solid #e0e0e5;
      background: #fff;
    }
    #prompt-box {
      background: #fafafa; border: 1px solid #e0e0e5; border-radius: 14px;
      display: flex; flex-direction: column; overflow: hidden; transition: border-color 0.2s;
    }
    #prompt-box:focus-within { border-color: #bbb; }
    #prompt-input {
      background: transparent; border: none; padding: 16px 18px 8px;
      color: #1a1a1a; font-size: 15px; font-family: 'DM Sans', sans-serif;
      resize: vertical; line-height: 1.6; min-height: 80px; width: 100%;
    }
    #prompt-input:focus { outline: none; }
    #prompt-input::placeholder { color: #bbb; }
    #prompt-footer {
      padding: 8px 14px 10px; display: flex;
      justify-content: space-between; align-items: center;
    }
    #prompt-hint { font-size: 11px; color: #ccc; }
    #run-btn {
      background: #efefef; border: none; border-radius: 8px; padding: 9px 22px;
      color: #bbb; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
    }
    #run-btn.ready { background: linear-gradient(135deg, #D97B4F, #c4623a); color: #fff; }
    #run-btn.ready:hover { opacity: 0.9; }

    #results {
      flex: 1; padding: 24px 32px; display: flex;
      gap: 16px; flex-wrap: wrap; align-items: flex-start;
    }

    .model-card {
      flex: 1 1 0; min-width: 220px; background: #fff; border-radius: 16px;
      border: 1.5px solid #e8e8ec; display: flex; flex-direction: column;
      overflow: hidden; transition: box-shadow 0.2s; animation: fadeIn 0.3s ease both;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .model-card-header {
      padding: 12px 18px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .model-card-header-left { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ffffff55; flex-shrink: 0; transition: all 0.3s;
    }
    .status-dot.loading { background: #fff; box-shadow: 0 0 8px #fff; animation: pulse 1s infinite; }
    .status-dot.done { background: #d4f5a0; }
    .status-dot.error { background: #ff8a8a; }

    .model-name { font-family: 'Instrument Serif', Georgia, serif; font-size: 17px; color: #fff; font-weight: 600; }
    .model-company { font-size: 11px; color: #ffffff99; font-family: monospace; letter-spacing: 0.05em; }

    .retry-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px; padding: 4px 10px; color: #fff; font-size: 11px;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.35); }
    .retry-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .model-body {
      flex: 1; padding: 16px 18px; font-size: 14px; line-height: 1.65;
      color: #bbb; font-family: 'DM Sans', sans-serif; white-space: pre-wrap;
      overflow-y: auto; min-height: 120px; max-height: 60vh;
    }
    .model-body.has-result { color: #1a1a1a; }
    .model-body.has-error { color: #cc3333; }
    .model-body .thinking { font-style: italic; }

    #empty-state {
      position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    #empty-state .icons { font-size: 40px; margin-bottom: 12px; opacity: 0.2; letter-spacing: 4px; }
    #empty-state p { font-family: 'Instrument Serif', serif; font-size: 18px; font-style: italic; color: #ccc; }
  </style>
</head>
<body>

  <div id="header">
    <div>
      <h1>AI <em>Side by Side</em></h1>
      <p>Compare Claude, ChatGPT, Gemini &amp; o3 in one prompt</p>
    </div>
    <button id="settings-btn" onclick="toggleSettings()">⚙ API Keys</button>
  </div>

  <div id="settings-panel">
    <div class="key-field">
      <label style="color:#D97B4F">Claude (Anthropic)</label>
      <input type="password" id="key-claude" placeholder="sk-ant-..." oninput="updateKeyBorder(this,'#D97B4F')"/>
    </div>
    <div class="key-field">
      <label style="color:#10A37F">ChatGPT (OpenAI)</label>
      <input type="password" id="key-openai" placeholder="sk-..." oninput="updateKeyBorder(this,'#10A37F')"/>
    </div>
    <div class="key-field">
      <label style="color:#4285F4">Gemini (Google)</label>
      <input type="password" id="key-gemini" placeholder="AIza..." oninput="updateKeyBorder(this,'#4285F4')"/>
    </div>
    <div class="key-field">
      <label style="color:#00A4EF">o3 (OpenAI key)</label>
      <input type="password" id="key-copilot" placeholder="sk-..." oninput="updateKeyBorder(this,'#00A4EF')"/>
    </div>
    <div class="key-note">
      <p>Keys stay in your browser only.<br/>Never stored — session memory only.</p>
    </div>
  </div>

  <div id="prompt-area">
    <div id="prompt-box">
      <textarea id="prompt-input" rows="3" placeholder='Ask anything… e.g. "Explain quantum entanglement in simple terms"' oninput="onPromptInput()" onkeydown="onPromptKey(event)"></textarea>
      <div id="prompt-footer">
        <span id="prompt-hint">Ctrl + Enter to run</span>
        <button id="run-btn" onclick="runAll()">Compare →</button>
      </div>
    </div>
  </div>

  <div id="results"></div>

  <div id="empty-state">
    <div class="icons">🤖🤖🤖🤖</div>
    <p>Enter a prompt above to compare responses</p>
  </div>

  <script>
    const MODELS = [
      { id: "claude",  name: "Claude",  company: "Anthropic", color: "#D97B4F" },
      { id: "chatgpt", name: "ChatGPT", company: "OpenAI",    color: "#10A37F" },
      { id: "gemini",  name: "Gemini",  company: "Google",    color: "#4285F4" },
      { id: "copilot", name: "o3",      company: "OpenAI",    color: "#00A4EF" },
    ];

    const lastPrompt = {};

    function initCards() {
      const container = document.getElementById('results');
      MODELS.forEach(m => {
        const card = document.createElement('div');
        card.className = 'model-card';
        card.id = `card-${m.id}`;
        card.innerHTML = `
          <div class="model-card-header" style="background:${m.color}">
            <div class="model-card-header-left">
              <div class="status-dot" id="dot-${m.id}"></div>
              <div>
                <div class="model-name">${m.name}</div>
                <div class="model-company">${m.company}</div>
              </div>
            </div>
            <button class="retry-btn" id="retry-${m.id}" onclick="retryCard('${m.id}')" disabled>↺ Retry</button>
          </div>
          <div class="model-body" id="body-${m.id}"><span style="color:#ccc">Response will appear here</span></div>
        `;
        container.appendChild(card);
      });
    }

    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('open');
      document.getElementById('settings-btn').classList.toggle('active');
    }

    function updateKeyBorder(input, color) {
      input.style.borderColor = input.value ? color : '#ddd';
    }

    function onPromptInput() {
      const val = document.getElementById('prompt-input').value.trim();
      document.getElementById('run-btn').classList.toggle('ready', val.length > 0);
    }

    function onPromptKey(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runAll();
    }

    function setCardLoading(id, color) {
      document.getElementById(`dot-${id}`).className = 'status-dot loading';
      const body = document.getElementById(`body-${id}`);
      body.className = 'model-body';
      body.innerHTML = `<span class="thinking" style="color:${color}">Thinking…</span>`;
      document.getElementById(`card-${id}`).style.boxShadow = `0 0 0 2px ${color}44`;
      document.getElementById(`retry-${id}`).disabled = true;
    }

    function setCardResult(id, text) {
      document.getElementById(`dot-${id}`).className = 'status-dot done';
      const body = document.getElementById(`body-${id}`);
      body.className = 'model-body has-result';
      body.textContent = text;
      document.getElementById(`card-${id}`).style.boxShadow = 'none';
      document.getElementById(`retry-${id}`).disabled = false;
    }

    function setCardError(id, msg) {
      document.getElementById(`dot-${id}`).className = 'status-dot error';
      const body = document.getElementById(`body-${id}`);
      body.className = 'model-body has-error';
      body.textContent = '⚠ ' + msg;
      document.getElementById(`card-${id}`).style.boxShadow = 'none';
      document.getElementById(`retry-${id}`).disabled = false;
    }

    async function retryCard(id) {
      if (!lastPrompt[id]) return;
      const model = MODELS.find(m => m.id === id);
      const prompt = lastPrompt[id];
      const openaiKey  = document.getElementById('key-openai').value.trim();
      const geminiKey  = document.getElementById('key-gemini').value.trim();
      const copilotKey = document.getElementById('key-copilot').value.trim();
      const claudeKey  = document.getElementById('key-claude').value.trim();

      const map = {
        claude:  { key: claudeKey,  fn: () => callClaude(prompt) },
        chatgpt: { key: openaiKey,  fn: () => callOpenAI(prompt, openaiKey) },
        gemini:  { key: geminiKey,  fn: () => callGemini(prompt, geminiKey) },
        copilot: { key: copilotKey, fn: () => callOpenAI(prompt, copilotKey, 'o3') },
      };

      const { key, fn } = map[id];
      if (!key) { setCardError(id, 'No API key provided. Click ⚙ API Keys above to add one.'); return; }
      setCardLoading(id, model.color);
      try {
        const text = await fn();
        setCardResult(id, text);
      } catch (err) {
        setCardError(id, err.message);
      }
    }

    async function callClaude(prompt) {
      const apiKey = document.getElementById('key-claude').value.trim();
      if (!apiKey) throw new Error('No Claude API key provided. Add it in ⚙ API Keys.');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Claude API error');
      return data.content?.[0]?.text || '';
    }

    async function callOpenAI(prompt, apiKey, model = 'gpt-4o') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: [{ role: 'user', content: prompt }],
          ...(model === 'o3' ? { max_completion_tokens: 1000 } : { max_tokens: 1000 })
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'OpenAI API error');
      return data.choices?.[0]?.message?.content || '';
    }

    async function callGemini(prompt, apiKey) {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Gemini API error');
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    async function runAll() {
      const prompt = document.getElementById('prompt-input').value.trim();
      if (!prompt) return;

      document.getElementById('empty-state').style.display = 'none';

      const claudeKey  = document.getElementById('key-claude').value.trim();
      const openaiKey  = document.getElementById('key-openai').value.trim();
      const geminiKey  = document.getElementById('key-gemini').value.trim();
      const copilotKey = document.getElementById('key-copilot').value.trim();

      const runners = [
        { id: 'claude',  color: '#D97B4F', key: claudeKey,  fn: () => callClaude(prompt) },
        { id: 'chatgpt', color: '#10A37F', key: openaiKey,  fn: () => callOpenAI(prompt, openaiKey) },
        { id: 'gemini',  color: '#4285F4', key: geminiKey,  fn: () => callGemini(prompt, geminiKey) },
        { id: 'copilot', color: '#00A4EF', key: copilotKey, fn: () => callOpenAI(prompt, copilotKey, 'o3') },
      ];

      runners.forEach(async ({ id, color, key, fn }) => {
        lastPrompt[id] = prompt;
        if (!key) { setCardError(id, 'No API key provided. Click ⚙ API Keys above to add one.'); return; }
        setCardLoading(id, color);
        try {
          const text = await fn();
          setCardResult(id, text);
        } catch (err) {
          setCardError(id, err.message);
        }
      });
    }

    initCards();
  </script>
</body>
</html>
